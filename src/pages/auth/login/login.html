<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body class="auth-page">
    <main class="auth-main">
        <div class="container auth-container">
            <section class="auth-card">
                <div class="auth-header">
                    <p class="auth-kicker">Food Store</p>
                    <h1 class="auth-title">Iniciar sesión</h1>
                    <p class="auth-subtitle">Ingresa con tu cuenta para continuar</p>
                </div>

                <form id="form" class="auth-form">
                    <div class="auth-field">
                        <label for="email" class="auth-label">Email</label>
                        <input type="email" id="email" name="email" class="auth-input" autocomplete="off"
                            placeholder="example@example.com" required>
                    </div>

                    <div class="auth-field">
                        <label for="password" class="auth-label">Password</label>
                        <input type="password" id="password" name="password" class="auth-input" autocomplete="off"
                            placeholder="********" required>
                    </div>

                    <button type="submit" class="auth-submit">Ingresar</button>
                </form>

                <p class="auth-footer-text">
                    ¿No tienes cuenta?
                    <a href="../registro/registro.html" class="auth-link">Regístrate</a>
                </p>
            </section>
        </div>
    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
