<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Inicio Cliente</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <header class="header client-header">
        <div class="container">
            <div class="header-content">
                <a id="logoLink" class="logo" href="/index.html">Food Store</a>
                <nav class="nav">
                    <a href="../../store/home/home.html" class="nav-link">Ver catálogo</a>
                    <button id="logoutButton" class="client-logout-btn">Cerrar sesión</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="main client-main">
        <section class="client-hero">
            <div class="container client-hero-layout">
                <div class="client-hero-copy">
                    <p class="client-kicker">Bienvenido</p>
                    <h2 class="client-title">Sabores que llegan a tu mesa</h2>
                    <p class="client-subtitle">
                        Descubre nuestras especialidades y arma tu pedido en minutos.
                        Pizzas, hamburguesas, bebidas y más en un solo lugar.
                    </p>

                    <div class="client-actions">
                        <a href="../../store/home/home.html" class="client-cta">Explorar productos</a>
                    </div>
                </div>

                <div class="hero-collage-wrapper">
                    <div class="hero-collage-glow"></div>
                    <div class="hero-collage" id="heroCollage"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container site-footer-content">
            <p class="site-footer-brand">Food Store</p>
            <p class="site-footer-note">Programacion III - Etchegoyen Gabriel</p>
        </div>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>

</html>
